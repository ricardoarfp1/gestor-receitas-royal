<!DOCTYPE html>
<html lang="pt-BR">

  <link rel="stylesheet" href="css/app.css" />
  <style>
    #loading-screen { min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1B2A4A;flex-direction:column;gap:16px; }
    .spinner { width:48px;height:48px;border:4px solid rgba(201,168,76,0.3);border-top-color:#C9A84C;border-radius:50%;animation:spin 0.8s linear infinite; }
    #loading-screen p { color:rgba(201,168,76,0.7);font-family:'DM Sans',sans-serif;font-weight:600;font-size:0.9rem; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>

  <div id="loading-screen">
    <div class="spinner"></div>
    <p>Carregando...</p>
  </div>
  <div id="app" style="display:none"></div>
  <script>
    window.SUPABASE_URL      = 'https://kpbvhbbltojohiescsru.supabase.co';

  </script>
